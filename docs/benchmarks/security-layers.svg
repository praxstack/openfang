<svg xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" viewBox="0 0 720 400"><defs><linearGradient id="sg" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient><linearGradient id="gg" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#6b7280"/><stop offset="100%" stop-color="#9ca3af"/></linearGradient><filter id="ds"><feDropShadow dx="0" dy="1" flood-opacity=".1" stdDeviation="2"/></filter></defs><rect width="720" height="400" fill="#0f172a" rx="12"/><text x="360" y="38" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">Security Defense Layers — Independent Systems Count</text><text x="360" y="58" fill="#94a3b8" font-size="11" text-anchor="middle">Measured: discrete, independently testable security mechanisms per framework</text><text x="145" y="108" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="end">OpenFang</text><text x="145" y="158" fill="#cbd5e1" font-size="13" text-anchor="end">OpenClaw</text><text x="145" y="208" fill="#cbd5e1" font-size="13" text-anchor="end">LangChain</text><text x="145" y="258" fill="#cbd5e1" font-size="13" text-anchor="end">AutoGPT</text><text x="145" y="308" fill="#cbd5e1" font-size="13" text-anchor="end">CrewAI</text><rect width="480" height="26" x="155" y="90" fill="url(#sg)" filter="url(#ds)" rx="4"/><text x="642" y="108" fill="#10b981" font-size="14" font-weight="700">16</text><rect width="90" height="26" x="155" y="140" fill="url(#gg)" filter="url(#ds)" rx="4"/><text x="252" y="158" fill="#9ca3af" font-size="14" font-weight="600">3</text><rect width="30" height="26" x="155" y="190" fill="url(#gg)" filter="url(#ds)" rx="4"/><text x="192" y="208" fill="#9ca3af" font-size="14" font-weight="600">1</text><rect width="60" height="26" x="155" y="240" fill="url(#gg)" filter="url(#ds)" rx="4"/><text x="222" y="258" fill="#9ca3af" font-size="14" font-weight="600">2</text><rect width="30" height="26" x="155" y="290" fill="url(#gg)" filter="url(#ds)" rx="4"/><text x="192" y="308" fill="#9ca3af" font-size="14" font-weight="600">1</text><text x="155" y="352" fill="#94a3b8" font-size="10">Layers include: capability gates, WASM sandbox, taint tracking, Merkle audit, Ed25519 manifests, SSRF protection,</text><text x="155" y="366" fill="#94a3b8" font-size="10">secret zeroization, OFP mutual auth, security headers, GCRA rate limiter, path traversal prevention,</text><text x="155" y="380" fill="#94a3b8" font-size="10">subprocess sandbox, prompt injection scanner, loop guard, session repair, health redaction</text></svg>