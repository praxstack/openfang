<svg xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" viewBox="0 0 800 420"><defs><linearGradient id="pf" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient><linearGradient id="pg" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#6b7280"/><stop offset="100%" stop-color="#9ca3af"/></linearGradient></defs><rect width="800" height="420" fill="#0f172a" rx="12"/><text x="400" y="36" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">Runtime Performance — Cold Start &amp; Resource Usage</text><text x="400" y="54" fill="#94a3b8" font-size="11" text-anchor="middle">Native Rust binary vs. Python runtime overhead</text><text x="50" y="90" fill="#e2e8f0" font-size="13" font-weight="600">Cold Start Time</text><text x="50" y="104" fill="#64748b" font-size="10">Time from process launch to first API response</text><text x="175" y="132" fill="#e2e8f0" font-size="11" text-anchor="end">OpenFang</text><rect width="52" height="22" x="180" y="118" fill="url(#pf)" rx="3"/><text x="238" y="133" fill="#10b981" font-size="12" font-weight="700">&lt;200ms</text><text x="175" y="162" fill="#cbd5e1" font-size="11" text-anchor="end">OpenClaw</text><rect width="320" height="22" x="180" y="148" fill="url(#pg)" rx="3"/><text x="506" y="163" fill="#9ca3af" font-size="12" font-weight="600">~3.2s</text><text x="175" y="192" fill="#cbd5e1" font-size="11" text-anchor="end">AutoGPT</text><rect width="520" height="22" x="180" y="178" fill="url(#pg)" rx="3"/><text x="706" y="193" fill="#9ca3af" font-size="12" font-weight="600">~5.4s</text><text x="50" y="240" fill="#e2e8f0" font-size="13" font-weight="600">Install Footprint</text><text x="50" y="254" fill="#64748b" font-size="10">Total disk space required for full installation</text><text x="175" y="282" fill="#e2e8f0" font-size="11" text-anchor="end">OpenFang</text><rect width="36" height="22" x="180" y="268" fill="url(#pf)" rx="3"/><text x="222" y="283" fill="#10b981" font-size="12" font-weight="700">~32 MB</text><text x="290" y="283" fill="#475569" font-size="10">(single binary)</text><text x="175" y="312" fill="#cbd5e1" font-size="11" text-anchor="end">OpenClaw</text><rect width="230" height="22" x="180" y="298" fill="url(#pg)" rx="3"/><text x="416" y="313" fill="#9ca3af" font-size="12" font-weight="600">~200 MB</text><text x="490" y="313" fill="#475569" font-size="10">(Python + deps)</text><text x="175" y="342" fill="#cbd5e1" font-size="11" text-anchor="end">LangChain</text><rect width="400" height="22" x="180" y="328" fill="url(#pg)" rx="3"/><text x="586" y="343" fill="#9ca3af" font-size="12" font-weight="600">~350 MB</text><text x="660" y="343" fill="#475569" font-size="10">(Python + deps)</text><text x="400" y="390" fill="#64748b" font-size="10" text-anchor="middle">OpenFang compiled with Rust 1.93 (release profile, LTO enabled). Python frameworks measured with pip install + dependencies.</text><text x="400" y="404" fill="#64748b" font-size="10" text-anchor="middle">Startup = time until HTTP health endpoint responds. Install size = du -sh after clean install.</text></svg>