text x="189" y="259" fill="#a7f3d0" font-size="9" text-anchor="middle">Scheduler</text><rect width="85" height="20" x="234" y="245" fill="#10b98133" rx="3"/><text x="276" y="259" fill="#a7f3d0" font-size="9" text-anchor="middle">Capabilities</text><rect width="85" height="20" x="326" y="245" fill="#10b98133" rx="3"/><text x="368" y="259" fill="#a7f3d0" font-size="9" text-anchor="middle">Workflow Eng</text><rect width="70" height="20" x="418" y="245" fill="#10b98133" rx="3"/><text x="453" y="259" fill="#a7f3d0" font-size="9" text-anchor="middle">RBAC Auth</text><rect width="75" height="20" x="495" y="245" fill="#10b98133" rx="3"/><text x="532" y="259" fill="#a7f3d0" font-size="9" text-anchor="middle">Metering</text><rect width="70" height="20" x="577" y="245" fill="#10b98133" rx="3"/><text x="612" y="259" fill="#a7f3d0" font-size="9" text-anchor="middle">EventBus</text><rect width="70" height="20" x="654" y="245" fill="#10b98133" rx="3"/><text x="689" y="259" fill="#a7f3d0" font-size="9" text-anchor="middle">Heartbeat</text><rect width="60" height="20" x="731" y="245" fill="#10b98133" rx="3"/><text x="761" y="259" fill="#a7f3d0" font-size="9" text-anchor="middle">Wizard</text><rect width="95" height="20" x="50" y="272" fill="#10b98133" rx="3"/><text x="97" y="286" fill="#a7f3d0" font-size="9" text-anchor="middle">Hot Reload</text><rect width="95" height="20" x="152" y="272" fill="#10b98133" rx="3"/><text x="199" y="286" fill="#a7f3d0" font-size="9" text-anchor="middle">Budget Manager</text><rect width="85" height="20" x="254" y="272" fill="#10b98133" rx="3"/><text x="296" y="286" fill="#a7f3d0" font-size="9" text-anchor="middle">Approvals</text><rect width="100" height="20" x="346" y="272" fill="#10b98133" rx="3"/><text x="396" y="286" fill="#a7f3d0" font-size="9" text-anchor="middle">Device Pairing</text><rect width="105" height="20" x="453" y="272" fill="#10b98133" rx="3"/><text x="505" y="286" fill="#a7f3d0" font-size="9" text-anchor="middle">Graceful Shutdown</text><rect width="110" height="20" x="565" y="272" fill="#10b98133" rx="3"/><text x="620" y="286" fill="#a7f3d0" font-size="9" text-anchor="middle">Circuit Breakers</text><line x1="300" x2="300" y1="303" y2="318" stroke="#475569" stroke-width="2"/><line x1="600" x2="600" y1="303" y2="318" stroke="#475569" stroke-width="2"/><rect width="420" height="110" x="30" y="318" fill="url(#rt)" stroke="#3b82f6" stroke-width="1" opacity=".12" rx="8"/><text x="50" y="337" fill="#60a5fa" font-size="9" font-weight="600" letter-spacing="1">RUNTIME — openfang-runtime</text><text x="50" y="354" fill="#93c5fd" font-size="10">Agent loop (streaming) | 3 LLM drivers | 53 tools</text><text x="50" y="369" fill="#93c5fd" font-size="10">WASM sandbox (dual metering) | MCP client/server</text><text x="50" y="384" fill="#93c5fd" font-size="10">Loop guard | Session repair | Auth cooldown</text><text x="50" y="399" fill="#93c5fd" font-size="10">Web search (4 engines) | Browser automation</text><text x="50" y="414" fill="#93c5fd" font-size="10">TTS/STT | Image gen | Docker sandbox | Compactor</text><rect width="200" height="110" x="460" y="318" fill="url(#ch)" stroke="#f59e0b" stroke-width="1" opacity=".12" rx="8"/><text x="480" y="337" fill="#fbbf24" font-size="9" font-weight="600" letter-spacing="1">CHANNELS</text><text x="480" y="354" fill="#fde68a" font-size="10">40 adapters</text><text x="480" y="369" fill="#fde68a" font-size="10">Bridge + Router</text><text x="480" y="384" fill="#fde68a" font-size="10">Rate limiter</text><text x="480" y="399" fill="#fde68a" font-size="10">DM/group policy</text><text x="480" y="414" fill="#fde68a" font-size="10">Formatter</text><rect width="200" height="110" x="670" y="318" fill="url(#ext)" stroke="#06b6d4" stroke-width="1" opacity=".12" rx="8"/><text x="690" y="337" fill="#22d3ee" font-size="9" font-weight="600" letter-spacing="1">SKILLS + HANDS</text><text x="690" y="354" fill="#a5f3fc" font-size="10">60 bundled skills</text><text x="690" y="369" fill="#a5f3fc" font-size="10">7 autonomous Hands</text><text x="690" y="384" fill="#a5f3fc" font-size="10">SKILL.md parser</text><text x="690" y="399" fill="#a5f3fc" font-size="10">FangHub marketplace</text><text x="690" y="414" fill="#a5f3fc" font-size="10">Injection scanner</text><line x1="450" x2="450" y1="428" y2="443" stroke="#475569" stroke-width="2"/><rect width="540" height="60" x="30" y="443" fill="url(#mem)" stroke="#ec4899" stroke-width="1" opacity=".12" rx="8"/><text x="50" y="462" fill="#f472b6" font-size="9" font-weight="600" letter-spacing="1">MEMORY — openfang-memory</text><text x="50" y="479" fill="#fbcfe8" font-size="10">SQLite (KV + relational) | Vector embeddings | Usage tracking | Canonical sessions | JSONL mirror</text><text x="50" y="494" fill="#fbcfe8" font-size="10">Schema v7 | Session compaction | Knowledge graphs</text><rect width="290" height="60" x="580" y="443" fill="#1e293b" stroke="#475569" stroke-width="1" rx="8"/><text x="600" y="462" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="1">EXTENSIONS</text><text x="600" y="479" fill="#cbd5e1" font-size="10">25 MCP templates | AES-256 vault</text><text x="600" y="494" fill="#cbd5e1" font-size="10">OAuth2 PKCE | Health monitor</text><rect width="840" height="55" x="30" y="515" fill="#1e293b" stroke="#334155" stroke-width="1" rx="8"/><text x="50" y="534" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="1">FOUNDATION</text><rect width="110" height="22" x="50" y="541" fill="#334155" rx="3"/><text x="105" y="556" fill="#e2e8f0" font-size="9" text-anchor="middle">openfang-types</text><rect width="100" height="22" x="170" y="541" fill="#334155" rx="3"/><text x="220" y="556" fill="#e2e8f0" font-size="9" text-anchor="middle">openfang-wire</text><rect width="120" height="22" x="280" y="541" fill="#334155" rx="3"/><text x="340" y="556" fill="#e2e8f0" font-size="9" text-anchor="middle">openfang-migrate</text><rect width="110" height="22" x="410" y="541" fill="#334155" rx="3"/><text x="465" y="556" fill="#e2e8f0" font-size="9" text-anchor="middle">openfang-hands</text><rect width="130" height="22" x="530" y="541" fill="#334155" rx="3"/><text x="595" y="556" fill="#e2e8f0" font-size="9" text-anchor="middle">openfang-extensions</text><text x="450" y="598" fill="#475569" font-size="10" text-anchor="middle">Taint tracking | Ed25519 manifests | Merkle audit | SSRF protection | Zeroizing secrets</text><text x="450" y="614" fill="#475569" font-size="10" text-anchor="middle">OFP mutual auth | Path traversal prevention | Subprocess sandbox | Prompt injection scanning</text><text x="450" y="630" fill="#334155" font-size="9" text-anchor="middle">16 independent security systems woven through every layer</text></svg>